# Builds the Vite app and uploads `dist` to Cloudflare Pages (root `wrangler.toml`: pages_build_output_dir, name).
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - 'components/**'
      - 'context/**'
      - 'public/**'
      - 'utils/**'
      - 'services/**'
      - 'lib/**'
      - 'App.tsx'
      - 'AppContext.tsx'
      - 'index.tsx'
      - 'index.html'
      - 'styles.css'
      - 'constants.ts'
      - 'types.ts'
      - 'vite.config.ts'
      - 'vite-env.d.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.app.json'
      - 'tsconfig.node.json'
      - '.env.production'
      - 'wrangler.toml'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite production)
        run: npm run build
        env:
          CI: true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name="vartmaan-sarokar-pages"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
