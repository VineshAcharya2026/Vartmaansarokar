# Deploy API Worker (wrangler.worker.toml) + Cloudflare Pages (Vite dist).
# Set repo secret CLOUDFLARE_API_TOKEN: Edit Cloudflare Workers, Cloudflare Pages — Edit, (optional) D1.
# If deploy fails with "unknown account", add CLOUDFLARE_ACCOUNT_ID as a second secret and reference it below.
#
# D1 schema is NOT applied on every run (intentional). When needed, run locally or add a one-off job:
#   wrangler d1 execute vartmaansarokar-db --file=schema.sql -c wrangler.worker.toml

name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: .

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist)
        run: npm run build
        env:
          CI: "true"

      - name: Deploy Worker (API)
        run: npx wrangler deploy -c wrangler.worker.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Pages (static site)
        run: npx wrangler pages deploy dist --project-name vartmaan-sarokar-pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
