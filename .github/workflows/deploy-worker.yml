# Deploys api.vartmaansarokaar.com (see wrangler.toml). Local `wrangler deploy` fails on Windows ARM64; use this or run wrangler in WSL/x64.
name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
