# Deploy API Worker (wrangler.worker.toml) from GitHub Actions.
# Required repo secrets:
# - CLOUDFLARE_API_TOKEN   (Workers Scripts:Edit)
# - CLOUDFLARE_ACCOUNT_ID  (Cloudflare account identifier)
#
# D1 schema is NOT applied on every run (intentional). When needed, run locally or add a one-off job:
#   wrangler d1 execute vartmaansarokar-db --file=schema.sql -c wrangler.worker.toml

name: Deploy Worker API

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      apply_d1_migrations:
        description: "Apply D1 migrations after worker deploy"
        required: false
        default: "false"

concurrency:
  group: worker-deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: .

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker (API)
        run: npx wrangler@4.85.0 deploy -c wrangler.worker.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_d1_migrations == 'true' }}
        run: npx wrangler@4.85.0 d1 migrations apply vartmaansarokar-db --remote -c wrangler.worker.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
