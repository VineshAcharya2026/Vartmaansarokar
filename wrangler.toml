name = "vartmaan-sarokaar-api"
main = "server/workers-entry.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
MAX_UPLOAD_SIZE_BYTES = "15728640"
OPENAI_MODEL = "gpt-4o-mini"
ALLOWED_ORIGINS = "https://main.vartmaan-sarokar-pages.pages.dev,https://vartmaan-sarokaar-pages.pages.dev,https://vartmaan-sarokaar.pages.dev,https://vartmaan-sarokaar-api.vineshjm.workers.dev"

[[d1_databases]]
binding = "DB"
database_name = "vartmaan-sarokar-db"
database_id = "22be003e-a1b0-40d1-a356-c0d88155c36b"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "vartmaan-media"

[ai]
binding = "AI"

# Pages configuration
pages_build_output_dir = "dist"